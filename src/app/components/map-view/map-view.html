<div class="map-view">
  <section class="search-panel" aria-label="Search sightings on map">
    <label for="map-search" class="search-label">Search sightings</label>
    <div class="search-row">
      <input
        id="map-search"
        class="search-input"
        type="search"
        [value]="searchTerm()"
        (input)="onSearchInput($event)"
        placeholder="Species, notes, or date"
      />
      @if (searchTerm()) {
        <button type="button" class="clear-btn" (click)="clearSearch()" aria-label="Clear search">
          Clear
        </button>
      }
    </div>
    <p class="search-meta" aria-live="polite">
      @if (loading()) {
        Loading sightings…
      } @else {
        Showing {{ resultCount() }} sighting(s)
      }
    </p>
    <p class="search-tip">Tip: click on the map to add a sighting at that location.</p>
    <div class="style-row" role="group" aria-label="Map style">
      <button
        type="button"
        class="style-btn"
        [class.active]="mapStyle() === 'regular'"
        (click)="setMapStyle('regular')"
        [attr.aria-pressed]="mapStyle() === 'regular'"
      >
        Regular
      </button>
      <button
        type="button"
        class="style-btn"
        [class.active]="mapStyle() === 'topo'"
        (click)="setMapStyle('topo')"
        [attr.aria-pressed]="mapStyle() === 'topo'"
      >
        Topo
      </button>
      <button
        type="button"
        class="style-btn"
        [class.active]="mapStyle() === 'satellite'"
        (click)="setMapStyle('satellite')"
        [attr.aria-pressed]="mapStyle() === 'satellite'"
      >
        Satellite
      </button>
    </div>
    <div class="mode-row">
      <button
        type="button"
        class="heatmap-btn"
        [class.active]="heatmapMode()"
        (click)="toggleHeatmap()"
        [attr.aria-pressed]="heatmapMode()"
      >
        @if (heatmapMode()) {
          Show markers
        } @else {
          Show heat map
        }
      </button>
    </div>
    <a routerLink="/explore" class="explore-link">Browse birds by area</a>
  </section>

  <div #mapContainer class="map" role="application" aria-label="Bird sightings map"></div>
  <a routerLink="/add" class="fab" aria-label="Add new bird sighting">+</a>
</div>
